<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — FarmTag</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F5EE;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: #2D5A27;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 12px;
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 800;
      color: #2D5A27;
    }
    .logo p { font-size: 13px; color: #666; margin-top: 2px; }
    h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1A1A1A;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #E0E0E0;
      border-radius: 12px;
      font-size: 15px;
      color: #1A1A1A;
      background: #F0F5EE;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2D5A27; }
    .requirements {
      font-size: 12px;
      color: #999;
      margin-top: -10px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #2D5A27;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4A7C43; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
    .message.success {
      background: #E8F5E9;
      color: #2D5A27;
      display: block;
    }
    .message.error {
      background: #FFEBEE;
      color: #C62828;
      display: block;
    }
    .success-screen {
      text-align: center;
      display: none;
    }
    .success-screen .emoji { font-size: 56px; margin-bottom: 16px; }
    .success-screen h2 { margin-bottom: 8px; }
    .success-screen p { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.6; }
    .open-app-btn {
      display: inline-block;
      background: #2D5A27;
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <h1>FarmTag</h1>
      <p>Farm Management System</p>
    </div>

    <!-- Reset Form -->
    <div id="reset-form">
      <h2>Set New Password</h2>
      <p class="subtitle">Enter your new password below.</p>

      <label for="password">New Password</label>
      <input type="password" id="password" placeholder="Enter new password" />
      <p class="requirements">At least 6 characters</p>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Confirm new password" />

      <button onclick="handleReset()" id="submit-btn">Reset Password</button>
      <div id="message" class="message"></div>
    </div>

    <!-- Success Screen -->
    <div id="success-screen" class="success-screen">
      <div class="emoji">✅</div>
      <h2>Password Reset!</h2>
      <p>Your password has been reset successfully.<br/>Please go back to the app and log in with your new password.</p>
    </div>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('message').className = 'message error';
      document.getElementById('message').textContent = 'Invalid or missing reset token. Please request a new reset link.';
      document.getElementById('submit-btn').disabled = true;
    }

    async function handleReset() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const msgEl = document.getElementById('message');
      const btn = document.getElementById('submit-btn');

      // Validate
      if (!password || password.length < 6) {
        msgEl.className = 'message error';
        msgEl.textContent = 'Password must be at least 6 characters.';
        return;
      }
      if (password !== confirm) {
        msgEl.className = 'message error';
        msgEl.textContent = 'Passwords do not match.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';
      msgEl.style.display = 'none';

      try {
        const res = await fetch('/api/v1/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById('reset-form').style.display = 'none';
          document.getElementById('success-screen').style.display = 'block';
        } else {
          msgEl.className = 'message error';
          msgEl.textContent = data.error || 'Failed to reset password. The link may have expired.';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        msgEl.className = 'message error';
        msgEl.textContent = 'Network error. Please check your connection and try again.';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
